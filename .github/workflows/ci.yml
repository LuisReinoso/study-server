name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        # pnpm-lock.yaml predates the pnpm 9 lockfile format, so this isn't
        # run with --frozen-lockfile: pnpm transparently upgrades the lockfile
        # format on install instead of failing.
        run: pnpm install

      - name: Run tests
        run: npx jest

      - name: Typecheck / build
        run: pnpm run build
